<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #111; }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    select, button {
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }

    select:hover, button:hover { border-color: #98a2b3; }

    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: #1d4ed8; }

    button.copy {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
      font-weight: 600;
    }
    button.copy:hover { background: #15803d; }

    button.secondary {
      background: #eaecf0;
      border-color: #d0d5dd;
      color: #344054;
    }
    button.secondary:hover { background: #d0d5dd; }

    button.add-btn {
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    button.add-btn:hover { background: #1d4ed8; }

    .loading {
      color: #667085;
      font-style: italic;
      padding: 2rem 0;
    }

    /* ── Custom person section ─────────────────────────────────── */

    .custom-person {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .custom-person-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .custom-person-header span {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
    }

    .custom-person-header input {
      flex: 1;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      background: #f9fafb;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      color: #111;
    }
    .custom-person-header input:focus { outline: none; border-color: #2563eb; }
    .custom-person-header input::placeholder { color: #98a2b3; font-weight: 400; }

    /* ── Shared: other items list ──────────────────────────────── */

    .other-item {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.2rem 0;
      font-size: 0.85rem;
    }

    .other-item span {
      flex: 1;
    }

    .other-item button {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      background: transparent;
      border: 1px solid #d0d5dd;
      color: #667085;
      line-height: 1;
    }
    .other-item button:hover { color: #dc2626; border-color: #dc2626; }
    .other-item button.edit-btn:hover { color: #2563eb; border-color: #2563eb; }

    .other-item-editing input {
      flex: 1;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      background: #f9fafb;
      border: 1px solid #2563eb;
      border-radius: 4px;
      color: #1a1a1a;
    }
    .other-item-editing input:focus { outline: none; }

    .other-items-list {
      margin-bottom: 0.5rem;
    }

    /* ── Note input row (shared between members and custom) ──── */

    .note-input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .note-input-row input {
      flex: 1;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      background: #f9fafb;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      color: #1a1a1a;
    }
    .note-input-row input:focus { outline: none; border-color: #2563eb; }
    .note-input-row input::placeholder { color: #98a2b3; }

    /* ── Member cards ───────────────────────────────────────────── */

    .member {
      background: #fff;
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .member.no-activity { opacity: 0.5; }
    .member.has-other { opacity: 1; }
    .member.checked { opacity: 0.45; }

    .member-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.75rem;
    }

    .member-check {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2563eb;
      cursor: pointer;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #667085;
      margin-top: 0.75rem;
      margin-bottom: 0.35rem;
    }

    .issue {
      padding: 0.35rem 0;
      font-size: 0.875rem;
    }

    .issue-header {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }

    .issue-id {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.8rem;
      color: #2563eb;
      white-space: nowrap;
      text-decoration: none;
    }
    .issue-id:hover { text-decoration: underline; }

    .issue-state {
      font-size: 0.75rem;
      color: #667085;
      white-space: nowrap;
    }

    .issue-transition {
      font-size: 0.75rem;
      color: #b45309;
      white-space: nowrap;
    }

    .issue-tag {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      white-space: nowrap;
    }

    .issue-comments {
      margin-left: 1.5rem;
      margin-top: 0.2rem;
    }

    .issue-comment {
      font-size: 0.8rem;
      color: #667085;
      padding: 0.15rem 0;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #16a34a;
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>Standup</h1>

<div class="toolbar">
  <select id="team-select">
    <option value="">Loading teams...</option>
  </select>
  <select id="hours-input">
    <option value="24">Last 24 hours</option>
    <option value="48">Last 48 hours</option>
    <option value="168">Last week</option>
  </select>
  <button class="primary" id="fetch-btn" disabled>Fetch activity</button>
  <button class="copy" id="copy-btn" style="display:none">Copy for Notion</button>
</div>

<!-- Custom person (outside the team) -->
<div class="custom-person" id="custom-person">
  <div class="custom-person-header">
    <span>Guest:</span>
    <input type="text" id="custom-person-name" placeholder="Name...">
  </div>
  <div class="section-label">Other</div>
  <div class="other-items-list" id="custom-person-others"></div>
  <div class="note-input-row">
    <input type="text" id="custom-person-input" placeholder="Add an update...">
    <button class="add-btn" id="custom-person-add">Add</button>
  </div>
</div>

<div id="content"></div>
<div class="toast" id="toast">Copied to clipboard</div>

<script>
const teamSelect = document.getElementById("team-select");
const hoursInput = document.getElementById("hours-input");
const fetchBtn = document.getElementById("fetch-btn");
const copyBtn = document.getElementById("copy-btn");
const content = document.getElementById("content");
const toast = document.getElementById("toast");
const customPersonSection = document.getElementById("custom-person");
const customPersonName = document.getElementById("custom-person-name");
const customPersonOthers = document.getElementById("custom-person-others");
const customPersonInput = document.getElementById("custom-person-input");
const customPersonAddBtn = document.getElementById("custom-person-add");

let activityData = [];
// Store "Other" items per member id
const memberOtherItems = {};

// ── Load teams ───────────────────────────────────────────────────────

async function loadTeams() {
  const res = await fetch("/api/teams");
  const teams = await res.json();
  teamSelect.innerHTML = "";
  for (const t of teams) {
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = `${t.name} (${t.memberCount} members)`;
    teamSelect.appendChild(opt);
  }
  fetchBtn.disabled = false;
}

loadTeams();

// ── Custom person (guest) ────────────────────────────────────────────

let customPersonItems = [];

function renderCustomPersonOthers() {
  customPersonOthers.innerHTML = "";
  customPersonItems.forEach((text, idx) => {
    const row = document.createElement("div");
    row.className = "other-item";
    row.innerHTML = `<span>\u2022 ${esc(text)}</span><button class="edit-btn" title="Edit">\u270E</button><button title="Remove">&times;</button>`;
    row.querySelector(".edit-btn").addEventListener("click", () => {
      row.className = "other-item other-item-editing";
      row.innerHTML = `<input type="text" value="${esc(text)}"><button class="add-btn" style="padding:0.3rem 0.6rem;font-size:0.75rem">Save</button>`;
      const input = row.querySelector("input");
      input.focus();
      const save = () => {
        const val = input.value.trim();
        if (val) customPersonItems[idx] = val;
        renderCustomPersonOthers();
      };
      row.querySelector("button").addEventListener("click", save);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") save(); });
    });
    row.querySelector("button:last-child").addEventListener("click", () => {
      customPersonItems.splice(idx, 1);
      renderCustomPersonOthers();
    });
    customPersonOthers.appendChild(row);
  });
}

function addCustomPersonItem() {
  const val = customPersonInput.value.trim();
  if (!val) return;
  customPersonItems.push(val);
  customPersonInput.value = "";
  renderCustomPersonOthers();
}

customPersonAddBtn.addEventListener("click", addCustomPersonItem);
customPersonInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") addCustomPersonItem();
});

// ── Fetch activity ───────────────────────────────────────────────────

fetchBtn.addEventListener("click", async () => {
  const teamId = teamSelect.value;
  if (!teamId) return;

  const hours = parseInt(hoursInput.value) || 24;

  content.innerHTML = '<div class="loading">Fetching activity from Linear...</div>';
  fetchBtn.disabled = true;
  copyBtn.style.display = "none";

  try {
    const res = await fetch(`/api/activity/${teamId}?hours=${hours}`);
    activityData = await res.json();
    renderActivity();
    copyBtn.style.display = "inline-block";
    customPersonSection.style.display = "block";
  } catch (err) {
    content.innerHTML = `<div class="loading">Error: ${err.message}</div>`;
  } finally {
    fetchBtn.disabled = false;
  }
});

// ── Render ────────────────────────────────────────────────────────────

function getMemberOtherItems(memberId) {
  if (!memberOtherItems[memberId]) memberOtherItems[memberId] = [];
  return memberOtherItems[memberId];
}

function renderMemberOthers(memberId) {
  const list = document.querySelector(`.other-items-list[data-member="${memberId}"]`);
  if (!list) return;
  const items = getMemberOtherItems(memberId);
  list.innerHTML = "";
  items.forEach((text, idx) => {
    const row = document.createElement("div");
    row.className = "other-item";
    row.innerHTML = `<span>\u2022 ${esc(text)}</span><button class="edit-btn" title="Edit">\u270E</button><button title="Remove">&times;</button>`;
    row.querySelector(".edit-btn").addEventListener("click", () => {
      row.className = "other-item other-item-editing";
      row.innerHTML = `<input type="text" value="${esc(text)}"><button class="add-btn" style="padding:0.3rem 0.6rem;font-size:0.75rem">Save</button>`;
      const input = row.querySelector("input");
      input.focus();
      const save = () => {
        const val = input.value.trim();
        if (val) items[idx] = val;
        renderMemberOthers(memberId);
      };
      row.querySelector("button").addEventListener("click", save);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") save(); });
    });
    row.querySelector("button:last-child").addEventListener("click", () => {
      items.splice(idx, 1);
      renderMemberOthers(memberId);
      updateMemberOpacity(memberId);
    });
    list.appendChild(row);
  });
}

function updateMemberOpacity(memberId) {
  const card = document.querySelector(`.member[data-member-id="${memberId}"]`);
  if (!card) return;
  const items = getMemberOtherItems(memberId);
  if (items.length > 0) {
    card.classList.add("has-other");
  } else {
    card.classList.remove("has-other");
  }
}

function addMemberOtherItem(memberId) {
  const input = document.querySelector(`.note-input-row input[data-member="${memberId}"]`);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  getMemberOtherItems(memberId).push(val);
  input.value = "";
  renderMemberOthers(memberId);
  updateMemberOpacity(memberId);
}

const checkedMembers = new Set();

function reorderMembers() {
  const cards = Array.from(content.querySelectorAll(".member"));
  cards.sort((a, b) => {
    const aChecked = checkedMembers.has(a.dataset.memberId) ? 1 : 0;
    const bChecked = checkedMembers.has(b.dataset.memberId) ? 1 : 0;
    if (aChecked !== bChecked) return aChecked - bChecked;
    return (parseInt(a.dataset.origIndex) || 0) - (parseInt(b.dataset.origIndex) || 0);
  });
  for (const card of cards) content.appendChild(card);
}

function renderActivity() {
  content.innerHTML = "";

  activityData.forEach((member, idx) => {
    const total = member.issues.length + member.orphanComments.length;

    const div = document.createElement("div");
    div.dataset.origIndex = idx;
    const isChecked = checkedMembers.has(member.id);
    div.className = "member" + (total === 0 && !isChecked ? " no-activity" : "") + (isChecked ? " checked" : "");
    div.dataset.memberId = member.id;

    let html = `<div class="member-name"><input type="checkbox" class="member-check" data-check="${member.id}" ${isChecked ? "checked" : ""}><span>${esc(member.name)}</span></div>`;

    if (total === 0) {
      html += '<div style="font-size:0.85rem;color:#98a2b3">No activity in the selected timeframe</div>';
    } else {
      if (member.issues.length) {
        html += '<div class="section-label">Issues</div>';
        for (const i of member.issues) {
          html += `<div class="issue"><div class="issue-header">`;
          html += `<a class="issue-id" href="${esc(i.url)}" target="_blank">${esc(i.identifier)}</a>`;
          html += `<span>${esc(i.title)}</span>`;
          if (i.stateTransitions.length) {
            html += `<span class="issue-transition">${esc(i.stateTransitions[i.stateTransitions.length - 1])}</span>`;
          } else {
            html += `<span class="issue-state">[${esc(i.state)}]</span>`;
          }
          if (i.created) html += `<span class="issue-tag">new</span>`;
          html += `</div>`;
          if (i.comments.length) {
            html += `<div class="issue-comments">`;
            for (const body of i.comments) {
              const short = body.length > 140 ? body.slice(0, 140) + "..." : body;
              html += `<div class="issue-comment">\u2192 ${esc(short)}</div>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }
      }
    }

    // Other section — always shown
    html += '<div class="section-label">Other</div>';
    html += `<div class="other-items-list" data-member="${member.id}"></div>`;
    html += `<div class="note-input-row">
      <input type="text" data-member="${member.id}" placeholder="Add an update for ${esc(member.name)}...">
      <button class="add-btn" data-member-add="${member.id}">Add</button>
    </div>`;

    div.innerHTML = html;
    content.appendChild(div);

    // Render existing other items
    renderMemberOthers(member.id);

    // Wire up add button and Enter key
    const addBtn = div.querySelector(`button[data-member-add="${member.id}"]`);
    addBtn.addEventListener("click", () => addMemberOtherItem(member.id));
    const input = div.querySelector(`.note-input-row input[data-member="${member.id}"]`);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addMemberOtherItem(member.id);
    });

    // Wire up checkbox
    const checkbox = div.querySelector(`.member-check[data-check="${member.id}"]`);
    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        checkedMembers.add(member.id);
        div.classList.add("checked");
        div.classList.remove("no-activity");
      } else {
        checkedMembers.delete(member.id);
        div.classList.remove("checked");
        if (total === 0) div.classList.add("no-activity");
      }
      reorderMembers();
    });
  });
}

// ── Copy for Notion ──────────────────────────────────────────────────

copyBtn.addEventListener("click", () => {
  const today = new Date().toLocaleDateString("en-US", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric",
  });

  let md = `# Standup \u2014 ${today}\n\n`;

  // Custom person (guest)
  const guestName = customPersonName.value.trim();
  if (guestName && customPersonItems.length) {
    md += `## ${guestName}\n\n`;
    md += `### Other\n\n`;
    for (const item of customPersonItems) {
      md += `- ${item}\n`;
    }
    md += `\n`;
  }

  // Team members
  for (const member of activityData) {
    const total = member.issues.length + member.orphanComments.length;
    const otherItems = getMemberOtherItems(member.id);

    if (total === 0 && otherItems.length === 0) continue;

    md += `## ${member.name}\n\n`;

    if (member.issues.length) {
      for (const i of member.issues) {
        let status;
        if (i.stateTransitions.length) {
          status = i.stateTransitions[i.stateTransitions.length - 1];
        } else {
          status = i.state;
        }
        const tag = i.created ? " `NEW`" : "";
        md += `- [**${i.identifier}** ${i.title}](${i.url}) \u2014 *${status}*${tag}\n`;
        for (const body of i.comments) {
          const short = body.replace(/\n/g, " ").slice(0, 200);
          md += `    - ${short}${body.length > 200 ? "..." : ""}\n`;
        }
      }
      md += `\n`;
    }

    if (otherItems.length) {
      md += `### Other\n\n`;
      for (const item of otherItems) {
        md += `- ${item}\n`;
      }
      md += `\n`;
    }
  }

  navigator.clipboard.writeText(md.trimEnd()).then(() => {
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  });
});

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
